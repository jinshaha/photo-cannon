<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>진단</title>
<style>
  body{margin:0;padding:16px;background:#111;color:#eee;
    font:15px/1.5 -apple-system,sans-serif}
  h1{font-size:17px;margin:0 0 14px}
  .r{padding:10px 12px;margin-bottom:6px;border-radius:8px;background:#1e242c;
    border-left:4px solid #555;font-size:14px}
  .r.ok{border-color:#35d07f}
  .r.no{border-color:#ff5c52;color:#ff8b84}
  .r b{display:block;font-size:12px;color:#8794a3;margin-bottom:2px}
  button{width:100%;min-height:52px;margin-top:14px;border:0;border-radius:10px;
    background:#ffb020;color:#191100;font:800 16px inherit}
  input[type=file]{margin-top:14px;width:100%}
</style>
</head>
<body>
<h1>Safari 진단</h1>
<div id="out"></div>
<input type="file" accept="image/*" capture="environment" id="cam">
<button id="go">사진 처리 테스트</button>

<script>
var out = document.getElementById('out');
function log(name, ok, msg){
  var d = document.createElement('div');
  d.className = 'r ' + (ok ? 'ok' : 'no');
  d.innerHTML = '<b>' + name + '</b>' + (msg || (ok ? 'OK' : 'FAIL'));
  out.appendChild(d);
}

window.onerror = function(m, s, l, c){
  log('JS 에러', false, m + ' @' + l + ':' + c);
  return true;
};

/* 기본 정보 */
log('User Agent', true, navigator.userAgent);
log('온라인', true, navigator.onLine ? '예' : '아니오');

/* 기능별 검사 */
try { log('IndexedDB', !!window.indexedDB); } catch(e){ log('IndexedDB', false, e.message); }
try { log('Cache API', !!window.caches); } catch(e){ log('Cache API', false, e.message); }
try { log('ServiceWorker', !!navigator.serviceWorker); } catch(e){ log('ServiceWorker', false, e.message); }
try { log('canShare', !!(navigator.canShare)); } catch(e){ log('canShare', false, e.message); }
try { log('TextEncoder', !!window.TextEncoder); } catch(e){ log('TextEncoder', false, e.message); }
try { log('Canvas toBlob', !!document.createElement('canvas').toBlob); } catch(e){ log('Canvas toBlob', false, e.message); }

/* 옵셔널 체이닝 지원 여부 */
try {
  eval('var z = ({a:1})?.a;');
  log('옵셔널 체이닝 (?.)', true);
} catch(e){ log('옵셔널 체이닝 (?.)', false, 'iOS 구버전 — 이게 원인일 수 있음'); }

/* IndexedDB 실제 열기 */
try {
  var r = indexedDB.open('diagtest', 1);
  r.onupgradeneeded = function(e){ e.target.result.createObjectStore('s', {keyPath:'k'}); };
  r.onsuccess = function(){ log('IndexedDB 열기', true, '성공'); };
  r.onerror = function(){ log('IndexedDB 열기', false, r.error ? r.error.message : '오류'); };
  r.onblocked = function(){ log('IndexedDB 열기', false, 'blocked'); };
} catch(e){ log('IndexedDB 열기', false, e.message); }

/* fetch 테스트 */
fetch('./data/requests.json?t=' + Date.now())
  .then(function(x){ return x.ok ? x.json() : Promise.reject('HTTP ' + x.status); })
  .then(function(j){ log('requests.json', true, '신청서 ' + (j.requests||[]).length + '건'); })
  .catch(function(e){ log('requests.json', false, String(e)); });

/* 사진 처리 (크래시 유력 지점) */
document.getElementById('go').onclick = function(){
  var f = document.getElementById('cam').files[0];
  if (!f) { log('사진', false, '사진을 먼저 선택하십시오'); return; }
  log('원본', true, (f.size/1048576).toFixed(2) + ' MB · ' + f.type);

  var img = new Image();
  var u = URL.createObjectURL(f);
  img.onload = function(){
    log('이미지 로드', true, img.width + '×' + img.height);
    try {
      var MAX = 1600;
      var w = img.width, h = img.height;
      var s = Math.min(1, MAX / Math.max(w, h));
      w = Math.round(w*s); h = Math.round(h*s);
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(u);
      c.toBlob(function(b){
        log('축소 완료', true, w + '×' + h + ' · ' + (b.size/1048576).toFixed(2) + ' MB');
      }, 'image/jpeg', 0.82);
    } catch(e){ log('축소', false, e.message); }
  };
  img.onerror = function(){ log('이미지 로드', false, '실패'); };
  img.src = u;
};
</script>
</body>
</html>
